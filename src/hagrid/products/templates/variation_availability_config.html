{% extends "base.html" %}

{% block content %}
    <h1>
        Change availablity
    </h1>
    <form method="post">
        {{ form.errors }}
        {% csrf_token %}
        {% for table in tables %}
            {% include "product_table.html" with table=table %}
        {% endfor %}
        <input class="btn btn-lg btn-success" type="submit" value="Save availabilities"/>
    </form>
{% endblock %}
